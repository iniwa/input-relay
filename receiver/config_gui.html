<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Input Display - 設定</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { color: #ffd700; margin-bottom: 8px; font-size: 22px; }
  h2 { color: #64b4ff; margin: 20px 0 10px; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 4px; }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .tab {
    padding: 8px 16px;
    background: #2a2a4a;
    border: 1px solid #444;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    color: #aaa;
    font-size: 14px;
  }
  .tab.active { background: #3a3a6a; color: #ffd700; border-bottom-color: #3a3a6a; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .form-group {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .form-group label {
    min-width: 140px;
    font-size: 14px;
    color: #aaa;
  }
  input[type="text"], input[type="number"] {
    background: #2a2a4a;
    border: 1px solid #555;
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 14px;
    width: 200px;
  }
  input:focus { outline: none; border-color: #64b4ff; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 13px;
  }
  th { background: #2a2a4a; padding: 6px 8px; text-align: left; color: #aaa; }
  td { padding: 4px 8px; border-bottom: 1px solid #333; }
  td input {
    background: #2a2a4a;
    border: 1px solid #444;
    color: #fff;
    padding: 3px 6px;
    border-radius: 3px;
    width: 80px;
    font-size: 13px;
  }
  td input.narrow { width: 50px; }

  .btn-row { margin: 12px 0; display: flex; gap: 8px; }
  button {
    padding: 8px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
  }
  .btn-save { background: #ffd700; color: #000; }
  .btn-save:hover { background: #ffed4a; }
  .btn-add { background: #3a6a3a; color: #fff; font-size: 12px; padding: 4px 12px; }
  .btn-del { background: #6a3a3a; color: #fff; font-size: 11px; padding: 2px 8px; }
  .btn-secondary { background: #3a3a6a; color: #ccc; }

  .status {
    padding: 8px 12px;
    border-radius: 4px;
    margin: 8px 0;
    font-size: 13px;
    display: none;
  }
  .status.ok { display: block; background: #1a4a1a; color: #4a4; }
  .status.err { display: block; background: #4a1a1a; color: #f66; }
  .hint { font-size: 12px; color: #666; margin-top: 4px; }

  /* Preview */
  .preview-section {
    margin-top: 20px;
  }
  .preview-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .preview-header h2 { margin: 0; }
  .preview-mode-toggle {
    display: flex;
    gap: 4px;
  }
  .preview-mode-btn {
    padding: 4px 12px;
    font-size: 12px;
    background: #2a2a4a;
    color: #aaa;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
  }
  .preview-mode-btn.active {
    background: #3a3a6a;
    color: #ffd700;
    border-color: #ffd700;
  }
  .preview-box {
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 20px;
    min-height: 160px;
    position: relative;
  }
  .preview-hint {
    font-size: 11px;
    color: #555;
    margin-top: 6px;
  }

  /* Overlay styles (scoped inside preview) */
  .preview-box .pv-container {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .preview-box .pv-grid {
    display: grid;
    gap: 4px;
  }
  .preview-box .pv-key {
    width: 56px;
    height: 56px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: rgba(0,0,0,0.4);
    transition: background 0.08s, border-color 0.08s, transform 0.08s;
    cursor: pointer;
    user-select: none;
  }
  .preview-box .pv-key:hover { border-color: rgba(255,255,255,0.8); }
  .preview-box .pv-key.active {
    background: rgba(255,220,50,0.85);
    border-color: #ffd700;
    color: #000;
    transform: scale(1.05);
  }
  .preview-box .pv-key.direction {
    border-color: rgba(100,180,255,0.6);
  }
  .preview-box .pv-key.direction:hover { border-color: rgba(100,180,255,0.9); }
  .preview-box .pv-key.direction.active {
    background: rgba(100,180,255,0.85);
    border-color: #64b4ff;
    color: #000;
  }
  .preview-box .pv-history {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
  }
  .preview-box .pv-history-entry {
    background: rgba(0,0,0,0.5);
    border-radius: 4px;
    padding: 4px 8px;
    white-space: nowrap;
  }
  .preview-box .pv-mode-label {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

<h1>Input Display 設定</h1>

<div class="tabs">
  <div class="tab active" data-tab="sender">Sender (Main PC)</div>
  <div class="tab" data-tab="keyboard">Keyboard レイアウト</div>
  <div class="tab" data-tab="leverless">Leverless レイアウト</div>
  <div class="tab" data-tab="history">入力履歴</div>
</div>

<div id="status" class="status"></div>

<!-- Sender Config -->
<div class="tab-content active" id="tab-sender">
  <h2>接続設定</h2>
  <div class="form-group">
    <label>Sub PC IP</label>
    <input type="text" id="sender-host" placeholder="192.168.1.211">
  </div>
  <div class="form-group">
    <label>WebSocket ポート</label>
    <input type="number" id="sender-port" value="8765">
  </div>
  <div class="form-group">
    <label>モード切替キー</label>
    <input type="text" id="sender-toggle" value="f12">
  </div>
  <p class="hint">※ Sender の設定変更後は Sender の再起動が必要です</p>
  <div class="btn-row">
    <button class="btn-save" onclick="saveSenderConfig()">保存</button>
  </div>
</div>

<!-- Keyboard Layout -->
<div class="tab-content" id="tab-keyboard">
  <h2>キーボード表示キー</h2>
  <table>
    <thead><tr><th>キー</th><th>ラベル</th><th>行</th><th>列</th><th></th></tr></thead>
    <tbody id="kb-keys"></tbody>
  </table>
  <div class="btn-row">
    <button class="btn-add" onclick="addKbKey()">+ キー追加</button>
    <button class="btn-save" onclick="saveOverlayConfig()">保存</button>
  </div>
</div>

<!-- Leverless Layout -->
<div class="tab-content" id="tab-leverless">
  <h2>方向ボタン</h2>
  <table>
    <thead><tr><th>キー</th><th>Gamepad</th><th>ラベル</th><th>行</th><th>列</th><th></th></tr></thead>
    <tbody id="lv-dirs"></tbody>
  </table>
  <div class="btn-row">
    <button class="btn-add" onclick="addLvDir()">+ 方向追加</button>
  </div>

  <h2>アクションボタン</h2>
  <table>
    <thead><tr><th>キー</th><th>Gamepad</th><th>ラベル</th><th>行</th><th>列</th><th></th></tr></thead>
    <tbody id="lv-btns"></tbody>
  </table>
  <div class="btn-row">
    <button class="btn-add" onclick="addLvBtn()">+ ボタン追加</button>
    <button class="btn-save" onclick="saveOverlayConfig()">保存</button>
  </div>
</div>

<!-- History -->
<div class="tab-content" id="tab-history">
  <h2>Keyboard モード</h2>
  <div class="form-group">
    <label>最大表示数</label>
    <input type="number" id="hist-kb-max" value="10" min="0">
    <span style="font-size:12px;color:#666">0 = 非表示</span>
  </div>
  <div class="form-group">
    <label>アイドルタイムアウト (ms)</label>
    <input type="number" id="hist-kb-idle" value="3000" min="0">
  </div>

  <h2>Leverless モード</h2>
  <div class="form-group">
    <label>最大表示数</label>
    <input type="number" id="hist-lv-max" value="10" min="0">
    <span style="font-size:12px;color:#666">0 = 非表示</span>
  </div>
  <div class="form-group">
    <label>アイドルタイムアウト (ms)</label>
    <input type="number" id="hist-lv-idle" value="3000" min="0">
  </div>

  <div class="btn-row">
    <button class="btn-save" onclick="saveOverlayConfig()">保存</button>
  </div>
</div>

<!-- Live Preview -->
<div class="preview-section">
  <div class="preview-header">
    <h2>プレビュー</h2>
    <div class="preview-mode-toggle">
      <button class="preview-mode-btn active" data-mode="keyboard" onclick="setPreviewMode('keyboard')">Keyboard</button>
      <button class="preview-mode-btn" data-mode="leverless" onclick="setPreviewMode('leverless')">Leverless</button>
    </div>
  </div>
  <div class="preview-box" id="preview-box">
    <div class="pv-mode-label" id="pv-mode-label">KEYBOARD</div>
    <div class="pv-container">
      <div class="pv-grid" id="pv-grid"></div>
      <div class="pv-history" id="pv-history"></div>
    </div>
  </div>
  <p class="preview-hint">ボタンをクリックで押下テスト / キーボード入力でもテスト可能 (このページにフォーカス時)</p>
</div>

<script>
let overlayConfig = {};
let senderConfig = {};
let previewMode = 'keyboard';
let pvPressed = new Set();
let pvKeyEls = {};
let pvHistoryEntries = [];
let pvDirState = { left: false, right: false, up: false, down: false };
let pvButtonLabels = {};

// Direction key mapping
const pvDirKeys = { a: 'left', d: 'right', w: 'up', s: 'down' };

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

function showStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.className = 'status'; }, 3000);
}

// ===== Preview =====
function setPreviewMode(mode) {
  previewMode = mode;
  document.querySelectorAll('.preview-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('pv-mode-label').textContent = mode.toUpperCase();
  pvPressed.clear();
  pvDirState = { left: false, right: false, up: false, down: false };
  pvHistoryEntries = [];
  document.getElementById('pv-history').innerHTML = '';
  const max = pvHistMax();
  document.getElementById('pv-history').style.display = max === 0 ? 'none' : 'flex';
  renderPreview();
}

function renderPreview() {
  const grid = document.getElementById('pv-grid');
  grid.innerHTML = '';
  pvKeyEls = {};
  pvButtonLabels = {};

  if (previewMode === 'keyboard') {
    renderPreviewKeyboard(grid);
  } else {
    renderPreviewLeverless(grid);
  }
}

function renderPreviewKeyboard(grid) {
  const keys = overlayConfig.keyboard?.displayKeys || [];
  if (!keys.length) {
    grid.innerHTML = '<div style="color:#555;font-size:13px">キーが設定されていません</div>';
    return;
  }
  const maxCol = Math.max(...keys.map(k => k.col)) + 1;
  const maxRow = Math.max(...keys.map(k => k.row)) + 1;
  grid.style.gridTemplateColumns = `repeat(${maxCol}, 56px)`;
  grid.style.gridTemplateRows = `repeat(${maxRow}, 56px)`;

  keys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'pv-key';
    el.textContent = k.label;
    el.style.gridRow = k.row + 1;
    el.style.gridColumn = k.col + 1;
    el.addEventListener('mousedown', () => pvSimPress(k.key, el));
    el.addEventListener('mouseup', () => pvSimRelease(k.key, el));
    el.addEventListener('mouseleave', () => { if (pvPressed.has(k.key)) pvSimRelease(k.key, el); });
    grid.appendChild(el);
    pvKeyEls[k.key] = el;
  });
}

function renderPreviewLeverless(grid) {
  const dirs = overlayConfig.leverless?.directions || [];
  const btns = overlayConfig.leverless?.buttons || [];
  const all = [...dirs, ...btns];
  if (!all.length) {
    grid.innerHTML = '<div style="color:#555;font-size:13px">ボタンが設定されていません</div>';
    return;
  }
  const maxCol = Math.max(...all.map(k => k.col)) + 1;
  const maxRow = Math.max(...all.map(k => k.row)) + 1;
  grid.style.gridTemplateColumns = `repeat(${maxCol}, 56px)`;
  grid.style.gridTemplateRows = `repeat(${maxRow}, 56px)`;

  dirs.forEach(k => {
    const el = document.createElement('div');
    el.className = 'pv-key direction';
    el.textContent = k.label;
    el.style.gridRow = k.row + 1;
    el.style.gridColumn = k.col + 1;
    el.addEventListener('mousedown', () => pvSimPress(k.key, el));
    el.addEventListener('mouseup', () => pvSimRelease(k.key, el));
    el.addEventListener('mouseleave', () => { if (pvPressed.has(k.key)) pvSimRelease(k.key, el); });
    grid.appendChild(el);
    pvKeyEls[k.key] = el;
  });

  btns.forEach(k => {
    const el = document.createElement('div');
    el.className = 'pv-key';
    el.textContent = k.label;
    el.style.gridRow = k.row + 1;
    el.style.gridColumn = k.col + 1;
    el.addEventListener('mousedown', () => pvSimPress(k.key, el));
    el.addEventListener('mouseup', () => pvSimRelease(k.key, el));
    el.addEventListener('mouseleave', () => { if (pvPressed.has(k.key)) pvSimRelease(k.key, el); });
    grid.appendChild(el);
    pvKeyEls[k.key] = el;
    pvButtonLabels[k.key] = k.label;
  });
}

function pvSimPress(key, el) {
  pvPressed.add(key);
  el.classList.add('active');
  if (pvDirKeys[key]) pvDirState[pvDirKeys[key]] = true;

  // Add to history
  const label = pvButtonLabels[key];
  const dir = pvDirKeys[key];
  if (label || dir) {
    const np = pvGetNumpad();
    const arrow = pvGetArrow(np);
    let text = '';
    if (label) text = arrow ? `${arrow}+${label}` : label;
    else if (arrow) text = arrow;
    if (text) pvAddHistory(text);
  }
}

function pvSimRelease(key, el) {
  pvPressed.delete(key);
  el.classList.remove('active');
  if (pvDirKeys[key]) pvDirState[pvDirKeys[key]] = false;
}

function pvGetNumpad() {
  const h = pvDirState.left ? -1 : pvDirState.right ? 1 : 0;
  const v = pvDirState.down ? -1 : pvDirState.up ? 1 : 0;
  const map = { '0,0':'5','1,0':'6','-1,0':'4','0,1':'8','0,-1':'2','1,1':'9','-1,1':'7','1,-1':'3','-1,-1':'1' };
  return map[`${h},${v}`] || '5';
}

function pvGetArrow(np) {
  return { '1':'↙','2':'↓','3':'↘','4':'←','5':'','6':'→','7':'↖','8':'↑','9':'↗' }[np] || '';
}

function pvHistMax() {
  const h = overlayConfig.inputHistory || {};
  return (h[previewMode] || h).maxEntries ?? 10;
}

function pvAddHistory(text) {
  const max = pvHistMax();
  if (max === 0) return;
  pvHistoryEntries.push(text);
  if (pvHistoryEntries.length > max) pvHistoryEntries.shift();
  const hist = document.getElementById('pv-history');
  hist.style.display = 'flex';
  hist.innerHTML = pvHistoryEntries.map(e => `<div class="pv-history-entry">${e}</div>`).join('');
}

// Keyboard input for preview
document.addEventListener('keydown', (e) => {
  // Don't capture if typing in an input field
  if (e.target.tagName === 'INPUT') return;
  const key = e.key.toLowerCase();
  const el = pvKeyEls[key];
  if (el && !pvPressed.has(key)) {
    pvSimPress(key, el);
  }
});
document.addEventListener('keyup', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const key = e.key.toLowerCase();
  const el = pvKeyEls[key];
  if (el) {
    pvSimRelease(key, el);
  }
});

// ===== Config editing =====
function renderKbKeys() {
  const tbody = document.getElementById('kb-keys');
  const keys = overlayConfig.keyboard?.displayKeys || [];
  tbody.innerHTML = keys.map((k, i) => `
    <tr>
      <td><input value="${k.key}" data-i="${i}" data-f="key"></td>
      <td><input value="${k.label}" data-i="${i}" data-f="label"></td>
      <td><input class="narrow" type="number" value="${k.row}" data-i="${i}" data-f="row"></td>
      <td><input class="narrow" type="number" value="${k.col}" data-i="${i}" data-f="col"></td>
      <td><button class="btn-del" onclick="delKbKey(${i})">✕</button></td>
    </tr>
  `).join('');
  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', () => {
      const idx = +inp.dataset.i;
      const field = inp.dataset.f;
      let val = inp.value;
      if (field === 'row' || field === 'col') val = +val;
      overlayConfig.keyboard.displayKeys[idx][field] = val;
      renderPreview();
    });
  });
  renderPreview();
}

function addKbKey() {
  if (!overlayConfig.keyboard) overlayConfig.keyboard = { displayKeys: [] };
  overlayConfig.keyboard.displayKeys.push({ key: '', label: '', row: 0, col: 0 });
  renderKbKeys();
}
function delKbKey(i) {
  overlayConfig.keyboard.displayKeys.splice(i, 1);
  renderKbKeys();
}

function renderLeverless() {
  renderLvTable('lv-dirs', overlayConfig.leverless?.directions || [], 'directions');
  renderLvTable('lv-btns', overlayConfig.leverless?.buttons || [], 'buttons');
  renderPreview();
}

function renderLvTable(tbodyId, items, field) {
  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = items.map((k, i) => `
    <tr>
      <td><input value="${k.key}" data-i="${i}" data-f="key" data-sec="${field}"></td>
      <td><input value="${k.gamepad || ''}" data-i="${i}" data-f="gamepad" data-sec="${field}"></td>
      <td><input value="${k.label}" data-i="${i}" data-f="label" data-sec="${field}"></td>
      <td><input class="narrow" type="number" value="${k.row}" data-i="${i}" data-f="row" data-sec="${field}"></td>
      <td><input class="narrow" type="number" value="${k.col}" data-i="${i}" data-f="col" data-sec="${field}"></td>
      <td><button class="btn-del" onclick="delLv('${field}',${i})">✕</button></td>
    </tr>
  `).join('');
  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', () => {
      const idx = +inp.dataset.i;
      const f = inp.dataset.f;
      const sec = inp.dataset.sec;
      let val = inp.value;
      if (f === 'row' || f === 'col') val = +val;
      overlayConfig.leverless[sec][idx][f] = val;
      renderPreview();
    });
  });
}

function addLvDir() {
  if (!overlayConfig.leverless) overlayConfig.leverless = { directions: [], buttons: [] };
  overlayConfig.leverless.directions.push({ key: '', gamepad: '', label: '', row: 0, col: 0 });
  renderLeverless();
}
function addLvBtn() {
  if (!overlayConfig.leverless) overlayConfig.leverless = { directions: [], buttons: [] };
  overlayConfig.leverless.buttons.push({ key: '', gamepad: '', label: '', row: 0, col: 0 });
  renderLeverless();
}
function delLv(field, i) {
  overlayConfig.leverless[field].splice(i, 1);
  renderLeverless();
}

function renderHistory() {
  const h = overlayConfig.inputHistory || {};
  const kb = h.keyboard || {};
  const lv = h.leverless || {};
  document.getElementById('hist-kb-max').value  = kb.maxEntries  ?? 10;
  document.getElementById('hist-kb-idle').value = kb.idleTimeoutMs ?? 3000;
  document.getElementById('hist-lv-max').value  = lv.maxEntries  ?? 10;
  document.getElementById('hist-lv-idle').value = lv.idleTimeoutMs ?? 3000;
}

async function saveOverlayConfig() {
  overlayConfig.inputHistory = {
    keyboard:  {
      maxEntries:   +document.getElementById('hist-kb-max').value,
      idleTimeoutMs: +document.getElementById('hist-kb-idle').value,
    },
    leverless: {
      maxEntries:   +document.getElementById('hist-lv-max').value,
      idleTimeoutMs: +document.getElementById('hist-lv-idle').value,
    },
  };

  const res = await fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(overlayConfig),
  });
  const data = await res.json();
  showStatus(data.ok ? '保存しました (オーバーレイをリロードしてください)' : 'エラー: ' + data.error, data.ok);
}

async function saveSenderConfig() {
  const cfg = {
    host: document.getElementById('sender-host').value,
    port: +document.getElementById('sender-port').value,
    toggleKey: document.getElementById('sender-toggle').value,
  };
  const res = await fetch('/api/sender-config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg),
  });
  const data = await res.json();
  showStatus(data.ok ? '保存しました (Sender を再起動してください)' : 'エラー: ' + data.error, data.ok);
}

async function init() {
  const [cfgRes, sndRes] = await Promise.all([
    fetch('/api/config'),
    fetch('/api/sender-config'),
  ]);
  overlayConfig = await cfgRes.json();
  senderConfig = await sndRes.json();

  document.getElementById('sender-host').value = senderConfig.host || '';
  document.getElementById('sender-port').value = senderConfig.port || 8765;
  document.getElementById('sender-toggle').value = senderConfig.toggleKey || 'f12';

  renderKbKeys();
  renderLeverless();
  renderHistory();
  renderPreview();
}

init();
</script>
