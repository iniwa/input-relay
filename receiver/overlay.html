<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* Draggable panels */
  .panel {
    position: absolute;
    cursor: move;
  }
  .panel.dragging { opacity: 0.7; }

  /* Key grid (keyboard / leverless) */
  #key-display {
    display: grid;
    gap: 4px;
  }
  #key-display.ctrl-layout {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .key-btn {
    min-width: 56px;
    height: 56px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    transition: background 0.05s, border-color 0.05s, transform 0.05s;
    text-align: center;
    line-height: 1.2;
  }
  .key-btn.active {
    background: rgba(255,220,50,0.85);
    border-color: #ffd700;
    color: #000;
    transform: scale(1.05);
  }
  .key-btn.direction {
    border-color: rgba(100,180,255,0.6);
  }
  .key-btn.direction.active {
    background: rgba(100,180,255,0.85);
    border-color: #64b4ff;
    color: #000;
  }

  .key-spacer { width: 20px; }

  /* Analog stick */
  .stick-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stick-label { font-size: 11px; color: rgba(255,255,255,0.5); }
  .stick-area {
    width: 80px; height: 80px;
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 50%; position: relative;
    background: rgba(0,0,0,0.4);
  }
  .stick-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.6);
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    transition: left 0.04s, top 0.04s;
  }
  .stick-area.tilted .stick-dot { background: rgba(255,220,50,0.9); }

  /* D-pad */
  .dpad-grid {
    display: grid;
    grid-template-columns: repeat(3, 26px);
    grid-template-rows: repeat(3, 26px);
    gap: 2px;
  }
  .dpad-cell { width: 26px; height: 26px; }
  .dpad-btn {
    width: 26px; height: 26px; font-size: 13px; font-weight: bold;
    border: 2px solid rgba(100,180,255,0.5); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4); color: #fff;
    transition: background 0.05s;
  }
  .dpad-btn.active {
    background: rgba(100,180,255,0.85);
    border-color: #64b4ff; color: #000;
  }

  .ctrl-buttons { display: grid; gap: 4px; }

  /* L2/R2 analog bar */
  .trigger-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .trigger-bar-bg {
    width: 16px; height: 60px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .trigger-bar-fill {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: rgba(255,220,50,0.85);
    border-radius: 4px;
    transition: height 0.04s;
  }
  .trigger-label { font-size: 10px; color: rgba(255,255,255,0.5); }

  /* History */
  #history {
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 18px;
    font-weight: bold;
    min-width: 200px;
    transition: opacity 0.5s;
  }
  .history-entry {
    background: rgba(0,0,0,0.5);
    border-radius: 4px;
    padding: 4px 8px;
    white-space: nowrap;
    opacity: 1;
    transition: opacity 0.3s;
  }
  .history-entry.fading { opacity: 0.3; }

  #mode-label {
    position: fixed;
    top: 4px; right: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div id="key-display" class="panel"></div>
<div id="history" class="panel"></div>
<div id="mode-label">KEYBOARD</div>

<script>
const params = new URLSearchParams(location.search);
const WS_PORT = params.get('ws') || '8765';
const WS_URL = `ws://${location.hostname}:${WS_PORT}/browser`;
const DISPLAY_MODE = params.get('mode') || 'all'; // 'all', 'input', 'history'

const NEUTRAL = '\u24C3';

let config = null;
let mode = 'keyboard';
let pressedKeys = new Set();
let keyElements = {};

let historyEntries = [];
let idleTimer = null;
let idleHideTimer = null;

let dirState = { left: false, right: false, up: false, down: false };
const dirKeys = {
  keyboard: { a: 'left', d: 'right', w: 'up', s: 'down' },
  leverless: { a: 'left', d: 'right', w: 'up', s: 'down' }
};
const gamepadDirKeys = {
  hat_0_left: 'left', hat_0_right: 'right', hat_0_up: 'up', hat_0_down: 'down',
  axis_0_neg: 'left', axis_0_pos: 'right', axis_1_neg: 'up', axis_1_pos: 'down'
};

let buttonLabels = {};
let axisState = {};

// --- Panel drag ---
let panelDrag = null;

function initPanelDrag() {
  document.querySelectorAll('.panel').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      if (e.target.closest('.key-btn, .dpad-btn, .history-entry, .stick-area')) return;
      panelDrag = {
        el,
        key: el.id === 'key-display' ? 'keyDisplay' : 'history',
        startX: e.clientX, startY: e.clientY,
        origLeft: el.offsetLeft, origTop: el.offsetTop
      };
      el.classList.add('dragging');
      e.preventDefault();
    });
  });
}

document.addEventListener('mousemove', (e) => {
  if (!panelDrag) return;
  panelDrag.el.style.left = (panelDrag.origLeft + e.clientX - panelDrag.startX) + 'px';
  panelDrag.el.style.top = (panelDrag.origTop + e.clientY - panelDrag.startY) + 'px';
});

document.addEventListener('mouseup', () => {
  if (!panelDrag) return;
  panelDrag.el.classList.remove('dragging');
  if (config) {
    if (!config.layout) config.layout = {};
    config.layout[panelDrag.key] = {
      x: panelDrag.el.offsetLeft,
      y: panelDrag.el.offsetTop
    };
    fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    }).catch(() => {});
  }
  panelDrag = null;
});

function applyLayout() {
  const layout = config?.layout || {};
  const kd = layout.keyDisplay || { x: 16, y: 16 };
  const hi = layout.history || { x: 600, y: 16 };
  document.getElementById('key-display').style.left = kd.x + 'px';
  document.getElementById('key-display').style.top = kd.y + 'px';
  document.getElementById('history').style.left = hi.x + 'px';
  document.getElementById('history').style.top = hi.y + 'px';
}

// --- Numpad notation ---
function getNumpad() {
  const h = dirState.left ? -1 : dirState.right ? 1 : 0;
  const v = dirState.down ? -1 : dirState.up ? 1 : 0;
  const map = {
    '0,0': '5', '1,0': '6', '-1,0': '4',
    '0,1': '8', '0,-1': '2',
    '1,1': '9', '-1,1': '7', '1,-1': '3', '-1,-1': '1'
  };
  return map[`${h},${v}`] || '5';
}

function getDirArrow(numpad) {
  const arrows = { '1':'\u2199','2':'\u2193','3':'\u2198','4':'\u2190','5':'','6':'\u2192','7':'\u2196','8':'\u2191','9':'\u2197' };
  return arrows[numpad] || '';
}

// --- Label rendering with \n support ---
function setLabelContent(el, label) {
  if (label && label.includes('\\n')) {
    el.innerHTML = label.replace(/\\n/g, '<br>');
  } else {
    el.textContent = label;
  }
}

// --- Build layouts ---
function applyWidth(el, k) {
  const w = k.width || 1;
  el.style.gridColumn = w > 1 ? `${k.col + 1} / span ${w}` : String(k.col + 1);
}

function buildKeyboard(cfg) {
  const display = document.getElementById('key-display');
  display.innerHTML = '';
  display.className = 'panel';
  keyElements = {};
  buttonLabels = {};
  const keys = cfg.keyboard?.displayKeys || [];
  if (!keys.length) return;
  const maxCol = Math.max(...keys.map(k => (k.col || 0) + (k.width || 1)));
  const maxRow = Math.max(...keys.map(k => k.row || 0)) + 1;
  display.style.gridTemplateColumns = `repeat(${maxCol}, 56px)`;
  display.style.gridTemplateRows = `repeat(${maxRow}, 56px)`;

  const kbDirSet = new Set(Object.keys(dirKeys.keyboard));
  keys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-btn';
    setLabelContent(el, k.label);
    el.style.gridRow = (k.row || 0) + 1;
    applyWidth(el, k);
    display.appendChild(el);
    keyElements[k.key] = el;
    if (!kbDirSet.has(k.key)) {
      buttonLabels[k.key] = k.label;
    }
  });
}

function buildLeverless(cfg) {
  const display = document.getElementById('key-display');
  display.innerHTML = '';
  display.className = 'panel';
  keyElements = {};
  buttonLabels = {};
  const dirs = cfg.leverless?.directions || [];
  const btns = cfg.leverless?.buttons || [];
  const all = [...dirs, ...btns];
  if (!all.length) return;
  const maxCol = Math.max(...all.map(k => (k.col || 0) + (k.width || 1)));
  const maxRow = Math.max(...all.map(k => k.row || 0)) + 1;
  display.style.gridTemplateColumns = `repeat(${maxCol}, 56px)`;
  display.style.gridTemplateRows = `repeat(${maxRow}, 56px)`;

  dirs.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-btn direction';
    setLabelContent(el, k.label);
    el.style.gridRow = (k.row || 0) + 1;
    applyWidth(el, k);
    display.appendChild(el);
    keyElements[k.key] = el;
    if (k.gamepad) keyElements[k.gamepad] = el;
  });

  btns.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-btn';
    setLabelContent(el, k.label);
    el.style.gridRow = (k.row || 0) + 1;
    applyWidth(el, k);
    display.appendChild(el);
    keyElements[k.key] = el;
    if (k.gamepad) {
      keyElements[k.gamepad] = el;
      buttonLabels[k.gamepad] = k.label;
    }
    buttonLabels[k.key] = k.label;
  });
}

function buildController(cfg) {
  const display = document.getElementById('key-display');
  display.innerHTML = '';
  display.className = 'panel ctrl-layout';
  keyElements = {};
  buttonLabels = {};
  axisState = {};

  const cc = cfg.controller || {};
  const stickPos = cc.stickPositions || {};

  // Left stick
  const lWrap = document.createElement('div');
  lWrap.className = 'stick-wrap';
  if (stickPos.leftStick) {
    lWrap.style.gridRow = (stickPos.leftStick.row || 0) + 1;
    lWrap.style.gridColumn = (stickPos.leftStick.col || 0) + 1;
  }
  const lArea = document.createElement('div');
  lArea.className = 'stick-area';
  lArea.id = 'stick-left';
  lArea.innerHTML = '<div class="stick-dot"></div>';
  const lLabel = document.createElement('div');
  lLabel.className = 'stick-label';
  lLabel.textContent = 'L';
  lWrap.appendChild(lArea);
  lWrap.appendChild(lLabel);
  display.appendChild(lWrap);

  // L2 trigger bar
  const l2Wrap = document.createElement('div');
  l2Wrap.className = 'trigger-wrap';
  l2Wrap.innerHTML = '<div class="trigger-bar-bg"><div class="trigger-bar-fill" id="trigger-l2" style="height:0"></div></div><div class="trigger-label">L2</div>';
  display.appendChild(l2Wrap);

  // D-pad
  const dpadWrap = document.createElement('div');
  dpadWrap.className = 'stick-wrap';
  const dpad = document.createElement('div');
  dpad.className = 'dpad-grid';
  const hatBtns = [
    { key: 'hat_0_up', label: '\u2191', r: 0, c: 1 },
    { key: 'hat_0_left', label: '\u2190', r: 1, c: 0 },
    { key: 'hat_0_right', label: '\u2192', r: 1, c: 2 },
    { key: 'hat_0_down', label: '\u2193', r: 2, c: 1 },
  ];
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const hb = hatBtns.find(b => b.r === r && b.c === c);
      if (hb) {
        const el = document.createElement('div');
        el.className = 'dpad-btn';
        el.textContent = hb.label;
        dpad.appendChild(el);
        keyElements[hb.key] = el;
      } else {
        const spacer = document.createElement('div');
        spacer.className = 'dpad-cell';
        dpad.appendChild(spacer);
      }
    }
  }
  const dpadLabel = document.createElement('div');
  dpadLabel.className = 'stick-label';
  dpadLabel.textContent = 'D-Pad';
  dpadWrap.appendChild(dpad);
  dpadWrap.appendChild(dpadLabel);
  display.appendChild(dpadWrap);

  // Face buttons
  const btns = cc.buttons || [];
  if (btns.length > 0) {
    const maxCol = Math.max(...btns.map(b => (b.col || 0) + (b.width || 1)));
    const maxRow = Math.max(...btns.map(b => b.row || 0)) + 1;
    const grid = document.createElement('div');
    grid.className = 'ctrl-buttons';
    grid.style.gridTemplateColumns = `repeat(${maxCol}, 56px)`;
    grid.style.gridTemplateRows = `repeat(${maxRow}, 56px)`;
    btns.forEach(b => {
      const el = document.createElement('div');
      el.className = 'key-btn';
      setLabelContent(el, b.label);
      el.style.gridRow = (b.row || 0) + 1;
      applyWidth(el, b);
      grid.appendChild(el);
      if (b.gamepad) {
        keyElements[b.gamepad] = el;
        buttonLabels[b.gamepad] = b.label;
      }
    });
    display.appendChild(grid);
  }

  // R2 trigger bar
  const r2Wrap = document.createElement('div');
  r2Wrap.className = 'trigger-wrap';
  r2Wrap.innerHTML = '<div class="trigger-bar-bg"><div class="trigger-bar-fill" id="trigger-r2" style="height:0"></div></div><div class="trigger-label">R2</div>';
  display.appendChild(r2Wrap);

  // Right stick
  if (cc.rightStick) {
    const rWrap = document.createElement('div');
    rWrap.className = 'stick-wrap';
    if (stickPos.rightStick) {
      rWrap.style.gridRow = (stickPos.rightStick.row || 0) + 1;
      rWrap.style.gridColumn = (stickPos.rightStick.col || 0) + 1;
    }
    const rArea = document.createElement('div');
    rArea.className = 'stick-area';
    rArea.id = 'stick-right';
    rArea.innerHTML = '<div class="stick-dot"></div>';
    const rLabel = document.createElement('div');
    rLabel.className = 'stick-label';
    rLabel.textContent = 'R';
    rWrap.appendChild(rArea);
    rWrap.appendChild(rLabel);
    display.appendChild(rWrap);
  }
}

function updateStickEl(el, x, y) {
  if (!el) return;
  const dz = config?.controller?.deadzone ?? 0.15;
  const mag = Math.hypot(x, y);
  const dot = el.querySelector('.stick-dot');
  if (mag < dz) {
    dot.style.left = '50%';
    dot.style.top = '50%';
    el.classList.remove('tilted');
  } else {
    dot.style.left = (50 + x * 38) + '%';
    dot.style.top  = (50 + y * 38) + '%';
    el.classList.add('tilted');
  }
}

function updateTriggerBar(id, value) {
  const el = document.getElementById(id);
  if (!el) return;
  // Triggers typically go from -1 (released) to 1 (pressed), normalize to 0-1
  const norm = Math.max(0, Math.min(1, (value + 1) / 2));
  el.style.height = (norm * 100) + '%';
}

function updateStickVisuals() {
  if (!config?.controller) return;
  const cc = config.controller;
  const lsX = cc.leftStick?.axisX ?? 0;
  const lsY = cc.leftStick?.axisY ?? 1;
  updateStickEl(document.getElementById('stick-left'), axisState[lsX] ?? 0, axisState[lsY] ?? 0);
  if (cc.rightStick) {
    const rsX = cc.rightStick.axisX ?? 2;
    const rsY = cc.rightStick.axisY ?? 3;
    updateStickEl(document.getElementById('stick-right'), axisState[rsX] ?? 0, axisState[rsY] ?? 0);
  }
  // L2/R2 analog triggers (typically axis 4 and 5)
  const l2Axis = cc.l2Axis ?? 4;
  const r2Axis = cc.r2Axis ?? 5;
  updateTriggerBar('trigger-l2', axisState[l2Axis] ?? -1);
  updateTriggerBar('trigger-r2', axisState[r2Axis] ?? -1);
}

function updateDirFromStick() {
  if (!config?.controller) return;
  const cc = config.controller;
  const src = cc.directionSource || 'leftStick';
  const stick = cc[src];
  if (!stick) return;
  const x = axisState[stick.axisX] ?? 0;
  const y = axisState[stick.axisY] ?? 0;
  const t = 0.5;
  dirState.left  = x < -t;
  dirState.right = x > t;
  dirState.up    = y < -t;
  dirState.down  = y > t;
}

function histCfg() {
  const h = config?.inputHistory || {};
  return h[mode] || h || {};
}

function buildLayout() {
  if (!config) return;
  if (mode === 'controller') {
    buildController(config);
  } else if (mode === 'leverless') {
    buildLeverless(config);
  } else {
    buildKeyboard(config);
  }
  document.getElementById('mode-label').textContent = mode.toUpperCase();
  pressedKeys.clear();
  dirState = { left: false, right: false, up: false, down: false };
  axisState = {};
  historyEntries = [];
  const histEl = document.getElementById('history');
  const max = histCfg().maxEntries ?? 10;
  histEl.style.display = max === 0 ? 'none' : 'flex';
  histEl.style.opacity = '1';
  if (max > 0) {
    historyEntries = [NEUTRAL];
    histEl.innerHTML = `<div class="history-entry">${NEUTRAL}</div>`;
  } else {
    historyEntries = [];
    histEl.innerHTML = '';
  }

  // Apply display mode filtering
  if (DISPLAY_MODE === 'input') {
    document.getElementById('history').style.display = 'none';
  } else if (DISPLAY_MODE === 'history') {
    document.getElementById('key-display').style.display = 'none';
  }

  applyLayout();
  initPanelDrag();
}

function resetIdleTimer() {
  const histEl = document.getElementById('history');
  // Remove fading from entries
  document.querySelectorAll('.history-entry').forEach(el => el.classList.remove('fading'));
  // Show history panel
  histEl.style.opacity = '1';

  if (idleTimer) clearTimeout(idleTimer);
  if (idleHideTimer) clearTimeout(idleHideTimer);

  const timeout = histCfg().idleTimeoutMs ?? 3000;

  // Fade entries after idle
  idleTimer = setTimeout(() => {
    document.querySelectorAll('.history-entry').forEach(el => el.classList.add('fading'));
  }, timeout);

  // Hide entire history panel after extended idle
  idleHideTimer = setTimeout(() => {
    histEl.style.opacity = '0';
  }, timeout + 2000);
}

function getCurrentStateText() {
  const arrow = getDirArrow(getNumpad());
  const btns = [];
  for (const key of pressedKeys) {
    const label = buttonLabels[key];
    if (label) btns.push(label);
  }
  if (!arrow && btns.length === 0) return NEUTRAL;
  const parts = [];
  if (arrow) parts.push(arrow);
  parts.push(...btns);
  return parts.join('+');
}

function recordCurrentState() {
  const max = histCfg().maxEntries ?? 10;
  if (max === 0) return;
  const text = getCurrentStateText();
  if (text === null) return;
  if (historyEntries.length > 0 && historyEntries[historyEntries.length - 1] === text) return;
  historyEntries.push(text);
  if (historyEntries.length > max) historyEntries.shift();
  const histEl = document.getElementById('history');
  histEl.innerHTML = '';
  historyEntries.forEach(entry => {
    const div = document.createElement('div');
    div.className = 'history-entry';
    div.textContent = entry;
    histEl.appendChild(div);
  });
  histEl.scrollTop = histEl.scrollHeight;
  resetIdleTimer();
}

function handleInput(data) {
  const key = data.key;
  const isDown = data.type === 'key_down';
  const el = keyElements[key];

  let dirName = null;
  if (mode === 'controller') {
    const src = config?.controller?.directionSource || 'leftStick';
    if (src === 'hat') {
      dirName = gamepadDirKeys[key] || null;
    }
  } else {
    const dMap = data.source === 'gamepad' ? gamepadDirKeys : dirKeys[mode];
    dirName = dMap ? dMap[key] : null;
  }

  if (isDown) {
    pressedKeys.add(key);
    if (el) el.classList.add('active');
    if (dirName) dirState[dirName] = true;
  } else {
    pressedKeys.delete(key);
    if (el) el.classList.remove('active');
    if (dirName) dirState[dirName] = false;
  }

  recordCurrentState();
}

function handleAxisUpdate(data) {
  axisState[data.axis] = data.value;
  if (mode === 'controller') {
    updateStickVisuals();
    const src = config?.controller?.directionSource || 'leftStick';
    if (src !== 'hat') {
      updateDirFromStick();
    }
    recordCurrentState();
  }
}

// --- WebSocket ---
function connect() {
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => console.log('Connected to server');
  ws.onclose = () => {
    console.log('Disconnected, reconnecting...');
    setTimeout(connect, 1000);
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'config') {
      config = data.data;
      buildLayout();
    } else if (data.type === 'mode_switch') {
      if (data.key === 'gamepad') {
        mode = 'leverless';
      } else {
        mode = data.key;
      }
      pressedKeys.clear();
      dirState = { left: false, right: false, up: false, down: false };
      axisState = {};
      buildLayout();
    } else if (data.type === 'axis_update') {
      handleAxisUpdate(data);
    } else {
      handleInput(data);
    }
  };
}

connect();
</script>
</body>
</html>
