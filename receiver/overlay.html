<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* Draggable panels */
  .panel {
    position: absolute;
    cursor: move;
  }
  .panel.dragging { opacity: 0.7; }

  /* Key grid (keyboard / leverless) */
  #key-display {
    display: grid;
    gap: 4px;
  }
  #key-display.ctrl-layout {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ctrl-top-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-top-spacer { flex: 1; }
  .ctrl-main-row {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .key-btn.shoulder-btn {
    min-width: 44px;
    height: 28px;
    font-size: 12px;
  }
  .key-btn {
    min-width: 56px;
    height: 56px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    transition: background 0.05s, border-color 0.05s, transform 0.05s;
    text-align: center;
    line-height: 1.2;
  }
  .key-btn.active {
    background: rgba(255,220,50,0.85);
    border-color: #ffd700;
    transform: scale(1.05);
  }
  .key-btn.afterglow {
    background: rgba(255,220,50,0.2);
    border-color: rgba(255,215,0,0.35);
  }
  .key-btn.direction {
    border-color: rgba(100,180,255,0.6);
  }
  .key-btn.direction.active {
    background: rgba(100,180,255,0.85);
    border-color: #64b4ff;
  }
  .key-btn.direction.afterglow {
    background: rgba(100,180,255,0.2);
    border-color: rgba(100,180,255,0.35);
  }

  .key-spacer { width: 20px; }

  /* Analog stick */
  .stick-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stick-label { font-size: 11px; color: rgba(255,255,255,0.5); }
  .stick-area {
    width: 80px; height: 80px;
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 50%; position: relative;
    background: rgba(0,0,0,0.4);
  }
  .stick-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.6);
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    transition: left 0.04s, top 0.04s;
  }
  .stick-area.tilted .stick-dot { background: rgba(255,220,50,0.9); }

  /* D-pad */
  .dpad-grid {
    display: grid;
    grid-template-columns: repeat(3, 26px);
    grid-template-rows: repeat(3, 26px);
    gap: 2px;
  }
  .dpad-cell { width: 26px; height: 26px; }
  .dpad-btn {
    width: 26px; height: 26px; font-size: 13px; font-weight: bold;
    border: 2px solid rgba(100,180,255,0.5); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4); color: #fff;
    transition: background 0.05s;
  }
  .dpad-btn.active {
    background: rgba(100,180,255,0.85);
    border-color: #64b4ff; color: #000;
  }

  .ctrl-buttons { display: grid; gap: 4px; }

  .ctrl-left-cluster, .ctrl-right-cluster {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .ctrl-center-btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }
  .key-btn.center-btn {
    min-width: 36px;
    height: 36px;
    font-size: 12px;
    border-radius: 50%;
  }
  .key-btn.face-btn {
    min-width: 26px;
    height: 26px;
    font-size: 12px;
    border-radius: 4px;
  }

  /* L2/R2 analog bar */
  .trigger-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .trigger-bar-bg {
    width: 16px; height: 60px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .trigger-bar-fill {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: rgba(255,220,50,0.85);
    border-radius: 4px;
    transition: height 0.04s;
  }
  .trigger-label { font-size: 10px; color: rgba(255,255,255,0.5); }

  /* History */
  #history {
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 18px;
    font-weight: bold;
    min-width: 200px;
    transition: opacity 0.5s;
  }
  .history-entry {
    background: rgba(0,0,0,0.5);
    border-radius: 4px;
    padding: 4px 8px;
    white-space: nowrap;
    opacity: 1;
    transition: opacity 0.5s;
  }
  .history-entry.fading { opacity: 0.3; }
  .history-entry.removing { opacity: 0; }

  #mode-label {
    position: fixed;
    top: 4px; right: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
  }

  /* Mouse trail */
  #mouse-trail {
    display: none;
  }
  #mouse-trail canvas {
    display: block;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    background: rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div id="key-display" class="panel"></div>
<div id="history" class="panel"></div>
<div id="mouse-trail" class="panel"><canvas></canvas></div>
<div id="mode-label"></div>

<script>
const params = new URLSearchParams(location.search);
const WS_PORT = params.get('ws') || window.__WS_PORT__ || '8888';
const WS_URL = `ws://${location.hostname}:${WS_PORT}/browser`;
const DISPLAY_MODE = window.__DISPLAY_MODE__ || params.get('mode') || 'all'; // 'all', 'input', 'history'

const NEUTRAL = 'N';

let config = null;
let mode = 'keyboard';
let pressedKeys = new Set();
let keyElements = {};

let historyEntries = [];  // { text, el, fadeTimer, removeTimer }

let dirState = { left: false, right: false, up: false, down: false };
const dirKeys = {
  keyboard: { a: 'left', d: 'right', w: 'up', s: 'down' },
  leverless: { a: 'left', d: 'right', w: 'up', s: 'down' }
};
const gamepadDirKeys = {
  hat_0_left: 'left', hat_0_right: 'right', hat_0_up: 'up', hat_0_down: 'down',
  axis_0_neg: 'left', axis_0_pos: 'right', axis_1_neg: 'up', axis_1_pos: 'down'
};

let buttonLabels = {};
let axisState = {};
let afterglowTimers = {};

// --- Panel drag ---
let panelDrag = null;

function initPanelDrag() {
  document.querySelectorAll('.panel').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      if (e.target.closest('.key-btn, .dpad-btn, .history-entry, .stick-area')) return;
      const panelKey = el.id === 'key-display' ? 'keyDisplay' : el.id === 'mouse-trail' ? 'mouseTrail' : 'history';
      panelDrag = {
        el,
        key: panelKey,
        startX: e.clientX, startY: e.clientY,
        origLeft: el.offsetLeft, origTop: el.offsetTop
      };
      el.classList.add('dragging');
      e.preventDefault();
    });
  });
}

document.addEventListener('mousemove', (e) => {
  if (!panelDrag) return;
  // Clear bottom anchor during drag so top takes effect
  panelDrag.el.style.bottom = '';
  panelDrag.el.style.top = (panelDrag.origTop + e.clientY - panelDrag.startY) + 'px';
  panelDrag.el.style.left = (panelDrag.origLeft + e.clientX - panelDrag.startX) + 'px';
});

document.addEventListener('mouseup', () => {
  if (!panelDrag) return;
  panelDrag.el.classList.remove('dragging');
  if (config) {
    if (!config.layout) config.layout = {};
    if (!config.layout[mode]) config.layout[mode] = {};
    const isHistBottom = panelDrag.key === 'history' && !(config?.inputHistory?.[mode]?.flip);
    const y = isHistBottom
      ? panelDrag.el.offsetTop + panelDrag.el.offsetHeight
      : panelDrag.el.offsetTop;
    config.layout[mode][panelDrag.key] = {
      ...(config.layout[mode][panelDrag.key] || {}),
      x: panelDrag.el.offsetLeft,
      y
    };
    fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    }).catch(() => {});
    applyLayout();
    applyMouseTrailLayout();
  }
  panelDrag = null;
});

function applyLayout() {
  const layoutAll = config?.layout || {};
  // Per-mode layout (new) or flat fallback (old)
  const ml = layoutAll[mode] || (layoutAll.keyDisplay ? layoutAll : {});
  const kd = ml.keyDisplay || { x: 16, y: 16, scale: 1 };
  const hi = ml.history    || { x: 600, y: 16, scale: 1 };
  const kdEl = document.getElementById('key-display');
  kdEl.style.left            = kd.x + 'px';
  kdEl.style.top             = kd.y + 'px';
  kdEl.style.transform       = `scale(${kd.scale || 1})`;
  kdEl.style.transformOrigin = 'top left';
  const hiEl = document.getElementById('history');
  const flip = !!(config?.inputHistory?.[mode]?.flip);
  hiEl.style.left = hi.x + 'px';
  if (flip) {
    // Newest at top: anchor from top, grow downward
    hiEl.style.top    = hi.y + 'px';
    hiEl.style.bottom = '';
    hiEl.style.transformOrigin = 'top left';
  } else {
    // Newest at bottom: anchor from bottom, grow upward
    hiEl.style.top    = '';
    hiEl.style.bottom = (document.documentElement.clientHeight - hi.y) + 'px';
    hiEl.style.transformOrigin = 'bottom left';
  }
  hiEl.style.transform = `scale(${hi.scale || 1})`;
}

// --- Numpad notation ---
function getNumpad() {
  const h = dirState.left ? -1 : dirState.right ? 1 : 0;
  const v = dirState.down ? -1 : dirState.up ? 1 : 0;
  const map = {
    '0,0': '5', '1,0': '6', '-1,0': '4',
    '0,1': '8', '0,-1': '2',
    '1,1': '9', '-1,1': '7', '1,-1': '3', '-1,-1': '1'
  };
  return map[`${h},${v}`] || '5';
}

function getDirArrow(numpad) {
  const arrows = { '1':'\u25C3\u25BE','2':'\u25BC','3':'\u25BE\u25B9','4':'\u25C0','5':'','6':'\u25B6','7':'\u25C3\u25B4','8':'\u25B2','9':'\u25B4\u25B9' };
  return arrows[numpad] || '';
}

// --- Label rendering with \n support ---
function setLabelContent(el, label) {
  if (label && label.includes('\\n')) {
    el.innerHTML = label.replace(/\\n/g, '<br>');
  } else {
    el.textContent = label;
  }
}

// --- Build layouts ---
function applyWidth(el, k) {
  const w = k.width || 1;
  el.style.gridColumn = w > 1 ? `${k.col + 1} / span ${w}` : String(k.col + 1);
}

function buildKeyboard(cfg) {
  const display = document.getElementById('key-display');
  display.innerHTML = '';
  display.className = 'panel';
  keyElements = {};
  buttonLabels = {};
  const keys = cfg.keyboard?.displayKeys || [];
  if (!keys.length) return;
  const maxCol = Math.max(...keys.map(k => (k.col || 0) + (k.width || 1)));
  const maxRow = Math.max(...keys.map(k => k.row || 0)) + 1;
  display.style.gridTemplateColumns = `repeat(${maxCol}, 56px)`;
  display.style.gridTemplateRows = `repeat(${maxRow}, 56px)`;

  const kbDirSet = new Set(Object.keys(dirKeys.keyboard));
  keys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-btn';
    setLabelContent(el, k.label);
    el.style.gridRow = (k.row || 0) + 1;
    applyWidth(el, k);
    display.appendChild(el);
    keyElements[k.key] = el;
    if (!kbDirSet.has(k.key)) {
      buttonLabels[k.key] = k.label;
    }
  });
}

function buildLeverless(cfg) {
  const display = document.getElementById('key-display');
  display.innerHTML = '';
  display.className = 'panel';
  keyElements = {};
  buttonLabels = {};
  const dirs = cfg.leverless?.directions || [];
  const btns = cfg.leverless?.buttons || [];
  const all = [...dirs, ...btns];
  if (!all.length) return;
  const maxCol = Math.max(...all.map(k => (k.col || 0) + (k.width || 1)));
  const maxRow = Math.max(...all.map(k => k.row || 0)) + 1;
  display.style.gridTemplateColumns = `repeat(${maxCol}, 56px)`;
  display.style.gridTemplateRows = `repeat(${maxRow}, 56px)`;

  dirs.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-btn direction';
    setLabelContent(el, k.label);
    el.style.gridRow = (k.row || 0) + 1;
    applyWidth(el, k);
    display.appendChild(el);
    keyElements[k.key] = el;
    if (k.gamepad) keyElements[k.gamepad] = el;
  });

  btns.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-btn';
    setLabelContent(el, k.label);
    el.style.gridRow = (k.row || 0) + 1;
    applyWidth(el, k);
    display.appendChild(el);
    keyElements[k.key] = el;
    if (k.gamepad) {
      keyElements[k.gamepad] = el;
      buttonLabels[k.gamepad] = k.label;
    }
    buttonLabels[k.key] = k.label;
  });
}

function buildController(cfg) {
  const display = document.getElementById('key-display');
  display.innerHTML = '';
  display.className = 'panel ctrl-layout';
  keyElements = {};
  buttonLabels = {};
  axisState = {};

  const cc = cfg.controller || {};
  const allBtns = cc.buttons || [];
  const lbId = cc.shoulderLeft || 'btn_4';
  const rbId = cc.shoulderRight || 'btn_5';
  const lbDef = allBtns.find(b => b.gamepad === lbId);
  const rbDef = allBtns.find(b => b.gamepad === rbId);
  const centerIds = cc.centerButtons || ['btn_6', 'btn_8', 'btn_7'];
  const centerSet = new Set(centerIds);
  const centerBtnDefs = centerIds.map(id => allBtns.find(b => b.gamepad === id)).filter(Boolean);
  const faceBtns = allBtns.filter(b => b.gamepad !== lbId && b.gamepad !== rbId && !centerSet.has(b.gamepad));

  // --- Top row: LT | LB | spacer | RB | RT ---
  const topRow = document.createElement('div');
  topRow.className = 'ctrl-top-row';

  const l2Wrap = document.createElement('div');
  l2Wrap.className = 'trigger-wrap';
  l2Wrap.innerHTML = '<div class="trigger-bar-bg"><div class="trigger-bar-fill" id="trigger-l2" style="height:0"></div></div>';
  topRow.appendChild(l2Wrap);

  if (lbDef) {
    const el = document.createElement('div');
    el.className = 'key-btn shoulder-btn';
    setLabelContent(el, lbDef.label);
    topRow.appendChild(el);
    keyElements[lbDef.gamepad] = el;
    buttonLabels[lbDef.gamepad] = lbDef.label;
  }

  const topSpacer = document.createElement('div');
  topSpacer.className = 'ctrl-top-spacer';
  topRow.appendChild(topSpacer);

  if (rbDef) {
    const el = document.createElement('div');
    el.className = 'key-btn shoulder-btn';
    setLabelContent(el, rbDef.label);
    topRow.appendChild(el);
    keyElements[rbDef.gamepad] = el;
    buttonLabels[rbDef.gamepad] = rbDef.label;
  }

  const r2Wrap = document.createElement('div');
  r2Wrap.className = 'trigger-wrap';
  r2Wrap.innerHTML = '<div class="trigger-bar-bg"><div class="trigger-bar-fill" id="trigger-r2" style="height:0"></div></div>';
  topRow.appendChild(r2Wrap);
  display.appendChild(topRow);

  // --- Main row: leftCluster | centerBtns | rightCluster ---
  const mainRow = document.createElement('div');
  mainRow.className = 'ctrl-main-row';

  // Left cluster: LS + D-pad stacked
  const leftCluster = document.createElement('div');
  leftCluster.className = 'ctrl-left-cluster';

  // Left stick
  const lWrap = document.createElement('div');
  lWrap.className = 'stick-wrap';
  const lArea = document.createElement('div');
  lArea.className = 'stick-area';
  lArea.id = 'stick-left';
  lArea.innerHTML = '<div class="stick-dot"></div>';
  lWrap.appendChild(lArea);
  leftCluster.appendChild(lWrap);

  // D-pad
  const dpadWrap = document.createElement('div');
  dpadWrap.className = 'stick-wrap';
  const dpad = document.createElement('div');
  dpad.className = 'dpad-grid';
  const hatBtns = [
    { key: 'hat_0_up',    label: '\u2191', r: 0, c: 1 },
    { key: 'hat_0_left',  label: '\u2190', r: 1, c: 0 },
    { key: 'hat_0_right', label: '\u2192', r: 1, c: 2 },
    { key: 'hat_0_down',  label: '\u2193', r: 2, c: 1 },
  ];
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const hb = hatBtns.find(b => b.r === r && b.c === c);
      if (hb) {
        const el = document.createElement('div');
        el.className = 'dpad-btn';
        el.textContent = hb.label;
        dpad.appendChild(el);
        keyElements[hb.key] = el;
      } else {
        const sp = document.createElement('div');
        sp.className = 'dpad-cell';
        dpad.appendChild(sp);
      }
    }
  }
  dpadWrap.appendChild(dpad);
  leftCluster.appendChild(dpadWrap);
  mainRow.appendChild(leftCluster);

  // Center buttons (View / Home / Menu)
  if (centerBtnDefs.length > 0) {
    const centerDiv = document.createElement('div');
    centerDiv.className = 'ctrl-center-btns';
    centerBtnDefs.forEach(b => {
      const el = document.createElement('div');
      el.className = 'key-btn center-btn';
      setLabelContent(el, b.label);
      centerDiv.appendChild(el);
      keyElements[b.gamepad] = el;
      buttonLabels[b.gamepad] = b.label;
    });
    mainRow.appendChild(centerDiv);
  }

  // Right cluster: face buttons + RS stacked
  const rightCluster = document.createElement('div');
  rightCluster.className = 'ctrl-right-cluster';

  // Face buttons grid
  if (faceBtns.length > 0) {
    const maxCol = Math.max(...faceBtns.map(b => (b.col || 0) + (b.width || 1)));
    const maxRow = Math.max(...faceBtns.map(b => b.row || 0)) + 1;
    const grid = document.createElement('div');
    grid.className = 'ctrl-buttons';
    grid.style.gridTemplateColumns = `repeat(${maxCol}, 26px)`;
    grid.style.gridTemplateRows = `repeat(${maxRow}, 26px)`;
    faceBtns.forEach(b => {
      const el = document.createElement('div');
      el.className = 'key-btn face-btn';
      setLabelContent(el, b.label);
      el.style.gridRow = (b.row || 0) + 1;
      applyWidth(el, b);
      grid.appendChild(el);
      if (b.gamepad) {
        keyElements[b.gamepad] = el;
        buttonLabels[b.gamepad] = b.label;
      }
    });
    rightCluster.appendChild(grid);
  }

  // Right stick
  if (cc.rightStick) {
    const rWrap = document.createElement('div');
    rWrap.className = 'stick-wrap';
    const rArea = document.createElement('div');
    rArea.className = 'stick-area';
    rArea.id = 'stick-right';
    rArea.innerHTML = '<div class="stick-dot"></div>';
    rWrap.appendChild(rArea);
    rightCluster.appendChild(rWrap);
  }

  mainRow.appendChild(rightCluster);
  display.appendChild(mainRow);
}

function updateStickEl(el, x, y) {
  if (!el) return;
  const dz = config?.controller?.deadzone ?? 0.15;
  const mag = Math.hypot(x, y);
  const dot = el.querySelector('.stick-dot');
  if (mag < dz) {
    dot.style.left = '50%';
    dot.style.top = '50%';
    el.classList.remove('tilted');
  } else {
    dot.style.left = (50 + x * 38) + '%';
    dot.style.top  = (50 + y * 38) + '%';
    el.classList.add('tilted');
  }
}

function updateTriggerBar(id, value) {
  const el = document.getElementById(id);
  if (!el) return;
  // Triggers typically go from -1 (released) to 1 (pressed), normalize to 0-1
  const norm = Math.max(0, Math.min(1, (value + 1) / 2));
  el.style.height = (norm * 100) + '%';
}

function updateStickVisuals() {
  if (!config?.controller) return;
  const cc = config.controller;
  const lsX = cc.leftStick?.axisX ?? 0;
  const lsY = cc.leftStick?.axisY ?? 1;
  updateStickEl(document.getElementById('stick-left'), axisState[lsX] ?? 0, axisState[lsY] ?? 0);
  if (cc.rightStick) {
    const rsX = cc.rightStick.axisX ?? 2;
    const rsY = cc.rightStick.axisY ?? 3;
    updateStickEl(document.getElementById('stick-right'), axisState[rsX] ?? 0, axisState[rsY] ?? 0);
  }
  // L2/R2 analog triggers (typically axis 4 and 5)
  const l2Axis = cc.l2Axis ?? 4;
  const r2Axis = cc.r2Axis ?? 5;
  updateTriggerBar('trigger-l2', axisState[l2Axis] ?? -1);
  updateTriggerBar('trigger-r2', axisState[r2Axis] ?? -1);
}

function updateDirFromStick() {
  if (!config?.controller) return;
  const cc = config.controller;
  const src = cc.directionSource || 'leftStick';
  const stick = cc[src];
  if (!stick) return;
  const x = axisState[stick.axisX] ?? 0;
  const y = axisState[stick.axisY] ?? 0;
  const t = 0.5;
  dirState.left  = x < -t;
  dirState.right = x > t;
  dirState.up    = y < -t;
  dirState.down  = y > t;
}

function histCfg() {
  const h = config?.inputHistory || {};
  return h[mode] || {};
}

function buildLayout() {
  if (!config) return;
  if (mode === 'controller') {
    buildController(config);
  } else if (mode === 'leverless') {
    buildLeverless(config);
  } else {
    buildKeyboard(config);
  }
  document.getElementById('mode-label').textContent = mode.toUpperCase();
  pressedKeys.clear();
  dirState = { left: false, right: false, up: false, down: false };
  axisState = {};
  Object.values(afterglowTimers).forEach(clearTimeout);
  afterglowTimers = {};
  // Clear all per-entry timers
  historyEntries.forEach(e => clearEntryTimers(e));
  historyEntries = [];
  const histEl = document.getElementById('history');
  histEl.innerHTML = '';
  const cfg = histCfg();
  const max = cfg.maxEntries ?? 10;
  histEl.style.display = max === 0 ? 'none' : 'flex';
  histEl.style.opacity = '1';
  if (max > 0) {
    const div = document.createElement('div');
    div.className = 'history-entry';
    div.textContent = NEUTRAL;
    histEl.appendChild(div);
    const entry = { text: NEUTRAL, el: div, fadeTimer: null, removeTimer: null };
    historyEntries = [entry];
    startEntryTimer(entry);
  }

  // Apply display mode filtering
  if (DISPLAY_MODE === 'input') {
    document.getElementById('history').style.display = 'none';
  } else if (DISPLAY_MODE === 'history') {
    document.getElementById('key-display').style.display = 'none';
  }

  applyLayout();
  initMouseTrail();
  applyMouseTrailLayout();
  initPanelDrag();
}

function startEntryTimer(entry) {
  const timeout = histCfg().idleTimeoutMs ?? 3000;
  // Fade after timeout
  entry.fadeTimer = setTimeout(() => {
    entry.el.classList.add('fading');
    // Remove after fade
    entry.removeTimer = setTimeout(() => {
      entry.el.classList.add('removing');
      setTimeout(() => removeEntry(entry), 500);
    }, 2000);
  }, timeout);
}

function clearEntryTimers(entry) {
  if (entry.fadeTimer) { clearTimeout(entry.fadeTimer); entry.fadeTimer = null; }
  if (entry.removeTimer) { clearTimeout(entry.removeTimer); entry.removeTimer = null; }
}

function removeEntry(entry) {
  const idx = historyEntries.indexOf(entry);
  if (idx === -1) return;
  historyEntries.splice(idx, 1);
  if (entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
  // Hide panel if empty
  if (historyEntries.length === 0) {
    document.getElementById('history').style.opacity = '0';
  }
}

function resetLatestEntryTimer() {
  if (historyEntries.length === 0) return;
  const last = historyEntries[historyEntries.length - 1];
  clearEntryTimers(last);
  last.el.classList.remove('fading', 'removing');
  startEntryTimer(last);
}

function getCurrentStateText() {
  const arrow = getDirArrow(getNumpad());
  const btns = [];
  for (const key of pressedKeys) {
    const label = buttonLabels[key];
    if (label) btns.push(label);
  }
  const dirPart = arrow || NEUTRAL;
  if (btns.length === 0) return dirPart;
  return [dirPart, ...btns].join('+');
}

function recordCurrentState() {
  const cfg = histCfg();
  const max = cfg.maxEntries ?? 10;
  console.log('[History Debug]', { mode, cfg, flip: cfg.flip, max, inputHistory: config?.inputHistory });
  if (max === 0) return;
  const text = getCurrentStateText();
  if (text === null) return;
  if (historyEntries.length > 0 && historyEntries[historyEntries.length - 1].text === text) return;

  const histEl = document.getElementById('history');
  histEl.style.opacity = '1';

  // Remove oldest if at max
  while (historyEntries.length >= max) {
    const old = historyEntries.shift();
    clearEntryTimers(old);
    if (old.el.parentNode) old.el.parentNode.removeChild(old.el);
  }

  // Create new entry
  const div = document.createElement('div');
  div.className = 'history-entry';
  div.textContent = text;
  const entry = { text, el: div, fadeTimer: null, removeTimer: null };

  // flip=false: newest at bottom → appendChild, anchor from bottom
  // flip=true:  newest at top    → prepend, anchor from top
  if (cfg.flip) {
    histEl.insertBefore(div, histEl.firstChild);
  } else {
    histEl.appendChild(div);
  }
  historyEntries.push(entry);

  // Start per-entry timer
  startEntryTimer(entry);
}

function handleInput(data) {
  const key = data.key;
  const isDown = data.type === 'key_down';
  const el = keyElements[key];

  let dirName = null;
  if (mode === 'controller') {
    const src = config?.controller?.directionSource || 'leftStick';
    if (src === 'hat') {
      dirName = gamepadDirKeys[key] || null;
    }
  } else {
    const dMap = data.source === 'gamepad' ? gamepadDirKeys : dirKeys[mode];
    dirName = dMap ? dMap[key] : null;
  }

  if (isDown) {
    pressedKeys.add(key);
    if (el) {
      if (afterglowTimers[key]) {
        clearTimeout(afterglowTimers[key]);
        delete afterglowTimers[key];
        el.classList.remove('afterglow');
      }
      el.classList.add('active');
    }
    if (dirName) dirState[dirName] = true;
  } else {
    pressedKeys.delete(key);
    if (el) {
      el.classList.remove('active');
      const ms = config?.afterglowMs ?? 50;
      if (ms > 0) {
        el.classList.add('afterglow');
        afterglowTimers[key] = setTimeout(() => {
          el.classList.remove('afterglow');
          delete afterglowTimers[key];
        }, ms);
      }
    }
    if (dirName) dirState[dirName] = false;
  }

  recordCurrentState();
}

function handleAxisUpdate(data) {
  axisState[data.axis] = data.value;
  if (mode === 'controller') {
    updateStickVisuals();
    const src = config?.controller?.directionSource || 'leftStick';
    if (src !== 'hat') {
      updateDirFromStick();
    }
    recordCurrentState();
  }
}

// --- Mouse trail ---
let trailPoints = [];  // { x, y, time } - x,y relative to center (0,0)
let trailAnimId = null;

function initMouseTrail() {
  const mtEl = document.getElementById('mouse-trail');
  const mt = config?.mouseTrail || {};
  const size = mt.frameSize || 200;
  const canvas = mtEl.querySelector('canvas');
  canvas.width = size;
  canvas.height = size;

  // Show/hide based on display mode
  if (!(DISPLAY_MODE === 'mouse-trail' || DISPLAY_MODE === 'all')) {
    mtEl.style.display = 'none';
    return;
  }
  // Per-mode visibility
  const vis = mt.visible || {};
  mtEl.style.display = vis[mode] !== false ? 'block' : 'none';

  trailPoints = [];
  if (trailAnimId) cancelAnimationFrame(trailAnimId);
  drawTrailLoop();
}

function handleMouseMove(data) {
  const mt = config?.mouseTrail || {};
  const sens = mt.sensitivity || 1.0;
  const dx = data.dx * sens;
  const dy = data.dy * sens;
  const now = performance.now();

  // Shift all existing points by -dx, -dy (trail moves opposite to mouse)
  for (const p of trailPoints) {
    p.x -= dx;
    p.y -= dy;
  }
  // Current position is always center (0, 0)
  trailPoints.push({ x: 0, y: 0, time: now });

  // Prune old points
  const duration = mt.trailDurationMs || 2000;
  while (trailPoints.length > 0 && now - trailPoints[0].time > duration) {
    trailPoints.shift();
  }
}

function drawTrailLoop() {
  const mtEl = document.getElementById('mouse-trail');
  if (mtEl.style.display === 'none') return;
  const canvas = mtEl.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const mt = config?.mouseTrail || {};
  const duration = mt.trailDurationMs || 2000;
  const color = mt.trailColor || '#ffffff';
  const dotSize = mt.dotSize || 4;
  const lineWidth = mt.lineWidth || 2;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const now = performance.now();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Parse trail color for rgba
  const r = parseInt(color.slice(1, 3), 16) || 255;
  const g = parseInt(color.slice(3, 5), 16) || 255;
  const b = parseInt(color.slice(5, 7), 16) || 255;

  // Draw trail line segments with fading opacity
  if (trailPoints.length > 1) {
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i = 1; i < trailPoints.length; i++) {
      const p0 = trailPoints[i - 1];
      const p1 = trailPoints[i];
      const age0 = now - p0.time;
      const age1 = now - p1.time;
      const alpha = 1 - Math.max(age0, age1) / duration;
      if (alpha <= 0) continue;
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.moveTo(cx + p0.x, cy + p0.y);
      ctx.lineTo(cx + p1.x, cy + p1.y);
      ctx.stroke();
    }
  }

  // Draw center dot (glow)
  ctx.save();
  ctx.shadowColor = `rgba(${r},${g},${b},0.8)`;
  ctx.shadowBlur = 10;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.beginPath();
  ctx.arc(cx, cy, dotSize, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  trailAnimId = requestAnimationFrame(drawTrailLoop);
}

function applyMouseTrailLayout() {
  const mtEl = document.getElementById('mouse-trail');
  if (!(DISPLAY_MODE === 'mouse-trail' || DISPLAY_MODE === 'all')) return;
  // Per-mode visibility
  const vis = config?.mouseTrail?.visible || {};
  const show = vis[mode] !== false;
  mtEl.style.display = show ? 'block' : 'none';
  if (!show) return;
  const layoutAll = config?.layout || {};
  const ml = layoutAll[mode] || {};
  const pos = ml.mouseTrail || { x: 700, y: 48, scale: 1 };
  mtEl.style.left = pos.x + 'px';
  mtEl.style.top = pos.y + 'px';
  mtEl.style.transform = `scale(${pos.scale || 1})`;
  mtEl.style.transformOrigin = 'top left';
}

// --- WebSocket ---
function connect() {
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    console.log('Connected to server');
    fetch('/api/config').then(r => r.json()).then(data => {
      config = data;
      buildLayout();
    }).catch(() => {});
  };
  ws.onclose = () => {
    console.log('Disconnected, reconnecting...');
    setTimeout(connect, 1000);
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'config') {
      config = data.data;
      buildLayout();
    } else if (data.type === 'mode_switch') {
      if (data.key === 'gamepad') {
        mode = 'leverless';
      } else {
        mode = data.key;
      }
      pressedKeys.clear();
      dirState = { left: false, right: false, up: false, down: false };
      axisState = {};
      buildLayout();
    } else {
      const delay = config?.displayDelayMs || 0;
      const process = () => {
        if (data.type === 'mouse_move') { handleMouseMove(data); return; }
        if (data.type === 'axis_update') handleAxisUpdate(data);
        else handleInput(data);
      };
      if (delay > 0) setTimeout(process, delay);
      else process();
    }
  };
}

connect();
</script>
